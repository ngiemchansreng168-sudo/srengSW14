<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USING BOOTSTRAP FORM</title>
    <!-- Link stylesheet for bootstrap -->
    <link rel="stylesheet" href="../CSS/bootstrap.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container" style="margin-top:30px;">
        <div class="row justify-content-center align-items-center">
            <form id="userForm" class="col-4 shadow p-3 mb-5 bg-body rounded">
                <h3 class="text-success">USER INFORMATION FORM</h3>
                <div class="mb-3">
                    <label for="fullname" class="form-label">Fullname:</label>
                    <div class="input-group">
                        <span class="input-group-text">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control" id="fullname" placeholder="  Enter your fullname" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label for="gender" class="form-label">Gender :</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="male" value="male" checked>
                        <label class="form-check-label" for="male">Male</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" id="female" value="female">
                        <label class="form-check-label" for="female">Female</label>
                    </div>
                    <div class="mb-3">
                        <label for="salary" class="form-label">Salary:</label>
                        <div class="input-group">
                            <span class="input-group-text">
                               <i class="bi bi-coin"></i>
                            </span>
                            <input type="number" class="form-control" id="salary" placeholder="Enter your salary" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="" class="form-label">Date of Birth:</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-calendar2-date"></i>
                            </span>
                            <input type="date" required class="form-control" id="dob">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="position" class="form-label">Position:</label>
                        <div class="input-group">
                            <span class="input-group-text">
                                <i class="bi bi-briefcase"></i>
                            </span>
                            <select id="position" class="form-select">
                                <option value="IT Support">IT Support</option>
                                <option value="Accounting ">Accounting</option>
                                <option value="Design">Design</option>
                                <option value="IT manager">IT manager</option>
                            </select>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="description">Description:</label>
                        <!-- <input type="text" required  id="description" class=""  style="text-align:left; justify-content: left; margin-top:5px;  width: 100%; height: 100px;"  > -->
                        <textarea id="description" class="form-control" placeholder="Enter your description"
                            style="margin-top:5px; width:100%; height:100px;"></textarea>
                    </div>
                </div>
                <div class="mb-3">
                    <button type="submit" class="btn btn-success w-25 me-3">Submit</button>
                    <button type="reset" class="btn btn-outline-danger w-25">Clear</button>
                </div>
                <div id="result" ></div>
            </form>
        </div>
    </div>
</body>
<script src="index.js"></script> 




</html>
